name: Build APK

on:
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build APK
      uses: ArtemSBulgakov/buildozer-action@v1
      id: buildozer
      with:
        workdir: .
        command: android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: plane_war_apk
        path: bin/*.apk
